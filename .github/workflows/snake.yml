name: Generate Snake

on:
  # Automatically runs every 24 hours
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows you to manually trigger the animation generation at any time from the Actions tab
  workflow_dispatch:
  
  # Also runs on every push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user contributions graph, outputs a svg animation
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push the svg files to the output branch
      # The content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/output/<file_name>
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
